<!DOCTYPE html>
<html>
<head>
    <title>Zed14 Portfolio</title>
    <style>
        body {
            font-family: Arial;
            background: #667eea;
            text-align: center;
            padding: 50px;
        }
        .box {
            background: white;
            max-width: 600px;
            margin: auto;
            padding: 30px;
            border-radius: 20px;
        }
        button {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🚀 Zed14 Portfolio</h1>
        <p id="test">Loading...</p>
        <button onclick="test()">Click Me</button>
    </div>

    <script>
        function test() {
            document.getElementById('test').innerHTML = "✅ It works! Your GitHub Pages is active!";
        }
        
        // Try to load GitHub repos
        fetch('https://api.github.com/users/zedo14/repos')
            .then(res => res.json())
            .then(data => {
                document.getElementById('test').innerHTML = "✅ Connected! You have " + data.length + " repositories!";
            })
            .catch(err => {
                document.getElementById('test').innerHTML = "✅ Page works! (GitHub API loading)";
            });
    </script>
</body>
</html>
